version: '3.8'

services:
  searxng:
    image: searxng/searxng:latest
    container_name: archon-searxng
    ports:
      - '8080:8080'
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_SECRET=archon-local-secret-change-me
    restart: unless-stopped
